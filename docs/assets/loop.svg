<svg width="800" height="440" viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6e40c9"/><stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1158c7"/><stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a7f37"/><stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9e6a03"/><stop offset="100%" stop-color="#d29922"/>
    </linearGradient>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a371f7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <rect width="800" height="440" fill="url(#bg)" rx="12"/>
  <rect width="800" height="440" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="700" fill="#e6edf3">openclaw-self-evolving</text>
  <text x="400" y="54" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#7d8590">Weekly Self-Improvement Loop · Proposals Only · No Silent Mutations</text>

  <!-- Center label -->
  <circle cx="400" cy="240" r="55" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="235" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#e6edf3">Weekly</text>
  <text x="400" y="253" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#e6edf3">Cron</text>

  <!-- Step 1: Analyze (top) -->
  <rect x="270" y="76" width="260" height="64" rx="10" fill="url(#gPurple)" opacity="0.18" stroke="#a371f7" stroke-width="1"/>
  <text x="400" y="102" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#c084fc">① Analyze</text>
  <text x="400" y="120" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">logs · AGENTS.md · behavior patterns</text>
  <text x="400" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">./evolve.sh</text>

  <!-- Step 2: Generate proposals (right) -->
  <rect x="578" y="168" width="190" height="64" rx="10" fill="url(#gBlue)" opacity="0.18" stroke="#1f6feb" stroke-width="1"/>
  <text x="673" y="194" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#58a6ff">② Propose</text>
  <text x="673" y="212" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">generate GitHub Issues</text>
  <text x="673" y="226" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">--create-issue flag</text>

  <!-- Step 3: You Review (bottom-right) -->
  <rect x="490" y="320" width="190" height="64" rx="10" fill="url(#gOrange)" opacity="0.18" stroke="#d29922" stroke-width="1"/>
  <text x="585" y="346" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#e3b341">③ You Review</text>
  <text x="585" y="364" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">accept / reject / modify</text>
  <text x="585" y="378" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#e3b341">↑ human in the loop</text>

  <!-- Step 4: Implement (bottom-left) -->
  <rect x="120" y="320" width="190" height="64" rx="10" fill="url(#gGreen)" opacity="0.18" stroke="#2ea043" stroke-width="1"/>
  <text x="215" y="346" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#3fb950">④ Implement</text>
  <text x="215" y="364" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">update AGENTS.md · hooks</text>
  <text x="215" y="378" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#3fb950">→ smarter agent</text>

  <!-- Connecting arrows -->
  <!-- 1 → center → 2 -->
  <path d="M 400 140 L 400 185" stroke="#a371f7" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M 455 220 L 578 200" stroke="#58a6ff" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- 2 → 3 -->
  <path d="M 673 232 L 630 320" stroke="#e3b341" stroke-width="1.5" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- 3 → 4 -->
  <path d="M 490 352 L 310 352" stroke="#3fb950" stroke-width="1.5" fill="none" marker-end="url(#arrowGreen)"/>
  <!-- 4 → back to 1 -->
  <path d="M 215 320 L 215 240 Q 215 185 270 120 Q 300 100 370 88" stroke="#a371f7" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>

  <!-- Safety badge -->
  <rect x="30" y="86" width="200" height="44" rx="8" fill="#21262d" stroke="#f85149" stroke-width="1" opacity="0.8"/>
  <text x="130" y="106" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#f85149">🔒 Safety Contract</text>
  <text x="130" y="122" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" fill="#7d8590">Proposals only — no silent mutations</text>

  <!-- Stats -->
  <text x="400" y="415" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#7d8590">~8% false positive rate · dry-run mode available · MIT licensed</text>
</svg>